<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>AcadLearn · Assessment Details</title>
  <!-- Font Awesome 5 for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background-color: #eff0f3;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ----- SIDEBAR (with hover animations) ----- */
    .sidebar {
      width: 260px;
      background: #ffffff;
      border-right: 2px solid #0d0d0d;
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      flex-shrink: 0;
      transition: width 0.3s ease, padding 0.3s ease, transform 0.3s ease;
      overflow: hidden;
      white-space: nowrap;
      z-index: 300;
    }

    @media (max-width: 640px) {
      .sidebar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        transform: translateX(0);
        box-shadow: 4px 0 10px rgba(0,0,0,0.1);
      }
      .sidebar.collapsed {
        transform: translateX(-100%);
        width: 260px;
        padding: 24px 16px;
      }
      .sidebar.collapsed:hover {
        transform: translateX(-100%);
      }
      .sidebar.collapsed .nav-item i {
        display: none;
      }
    }

    .sidebar.collapsed {
      width: 80px;
      padding: 24px 10px;
    }

    .sidebar:not(.collapsed) .nav-item i {
      display: none;
    }

    .sidebar.collapsed .menu-label,
    .sidebar.collapsed .sidebar-footer span,
    .sidebar.collapsed .logo-container span {
      opacity: 0;
      width: 0;
      display: none;
    }

    .sidebar.collapsed .nav-item {
      justify-content: center;
      padding: 12px 0;
    }

    .sidebar.collapsed .nav-item i {
      display: inline-block;
      margin: 0;
      font-size: 1.6rem;
    }

    @media (min-width: 641px) {
      .sidebar.collapsed:hover {
        width: 260px;
        padding: 24px 16px;
      }
      .sidebar.collapsed:hover .menu-label,
      .sidebar.collapsed:hover .sidebar-footer span,
      .sidebar.collapsed:hover .logo-container span {
        opacity: 1;
        width: auto;
        display: inline-block;
      }
      .sidebar.collapsed:hover .nav-item {
        justify-content: flex-start;
        padding: 12px 16px;
      }
      .sidebar.collapsed:hover .nav-item i {
        display: none;
      }
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      width: 100%;
      min-height: 60px;
    }

    .logo-full, .logo-mini {
      max-width: 100%;
      height: auto;
      max-height: 60px;
      object-fit: contain;
      transition: opacity 0.2s ease;
    }

    .sidebar:not(.collapsed) .logo-mini {
      display: none;
    }
    .sidebar:not(.collapsed) .logo-full {
      display: block;
    }
    .sidebar.collapsed .logo-full {
      display: none;
    }
    .sidebar.collapsed .logo-mini {
      display: block;
    }
    .sidebar.collapsed:hover .logo-full {
      display: block;
    }
    .sidebar.collapsed:hover .logo-mini {
      display: none;
    }

    .nav-menu {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      border-radius: 14px;
      font-weight: 600;
      color: #0d0d0d;
      border: 2px solid transparent;
      transition: all 0.2s ease;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-item.active {
      background: #ff8e3c;
      border: 2px solid #0d0d0d;
      box-shadow: 3px 3px 0 #0d0d0d;
    }
    .nav-item.active i {
      color: #0d0d0d;
    }
    .nav-item:hover:not(.active) {
      background: #eff0f3;
      border: 2px solid #0d0d0d;
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 #0d0d0d;
    }

    .menu-label {
      font-size: 1rem;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 20px 8px 8px;
      border-top: 2px dashed #0d0d0d;
      text-align: center;
      font-weight: 600;
      white-space: nowrap;
    }

    .sidebar-footer span {
      font-size: 0.9rem;
      transition: opacity 0.2s;
    }

    .sidebar-toggle-icon {
      background: #ff8e3c;
      border: 2px solid #0d0d0d;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin: 16px auto 0;
      font-size: 1.3rem;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }
    .sidebar-toggle-icon:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }

    /* ----- MAIN WRAPPER ----- */
    .main-wrapper {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      background: #eff0f3;
      width: 100%;
    }

    /* TOPBAR - exact match from reference */
    .topbar {
      background: #ffffff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid #0d0d0d;
      flex-wrap: wrap;
      gap: 8px;
    }

    @media (min-width: 768px) {
      .topbar {
        padding: 12px 28px;
      }
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .back-button {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #eff0f3;
      padding: 8px 18px;
      border-radius: 40px;
      border: 2px solid #0d0d0d;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      color: #0d0d0d;
      white-space: nowrap;
      transition: all 0.2s ease;
    }
    .back-button:hover {
      background: #ff8e3c;
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }

    .datetime-plain {
      font-weight: 500;
      cursor: pointer;
      color: #0d0d0d;
      font-size: 0.9rem;
      white-space: nowrap;
      transition: all 0.2s ease;
      padding: 4px 8px;
      border-radius: 20px;
      border: 2px solid transparent;
    }
    .datetime-plain:hover {
      border: 2px solid #0d0d0d;
      background: #ff8e3c;
      transform: translate(-2px, -2px);
      box-shadow: 3px 3px 0 #0d0d0d;
    }
    .datetime-plain i {
      color: #ff8e3c;
      margin-right: 4px;
    }
    .datetime-plain:hover i {
      color: #0d0d0d;
    }

    .user-section {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .user-plain {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-weight: 500;
      font-size: 0.9rem;
      flex-wrap: wrap;
    }

    .user-plain .user-name {
      font-weight: 700;
      color: #0d0d0d;
    }
    .user-plain .user-course {
      color: #2a2a2a;
      font-size: 0.8rem;
    }

    .settings-dropdown {
      position: relative;
    }

    .settings-btn {
      background: #ff8e3c;
      border: 2px solid #0d0d0d;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .settings-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      right: 0;
      top: 48px;
      background: #ffffff;
      min-width: 150px;
      border: 2px solid #0d0d0d;
      border-radius: 20px;
      box-shadow: 4px 4px 0 #0d0d0d;
      z-index: 100;
    }
    .dropdown-content a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      color: #0d0d0d;
      text-decoration: none;
      border-bottom: 1px solid #0d0d0d;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .dropdown-content a:last-child {
      border-bottom: none;
    }
    .dropdown-content a:hover {
      background: #ff8e3c;
      transform: translate(-2px, -2px);
      box-shadow: 3px 3px 0 #0d0d0d;
    }
    .dropdown-content.show {
      display: block;
    }

    /* ----- ASSESSMENT CONTENT (shadows only on hover) ----- */
    .assessment-content {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
    }

    .assessment-card {
      background: #ffffff;
      border: 4px solid #0d0d0d;
      border-radius: 40px;
      padding: 32px;
      max-width: 800px;
      margin: 0 auto;
      box-shadow: none;
      transition: all 0.2s ease;
    }
    .assessment-card:hover {
      transform: translate(-3px, -3px);
      box-shadow: 12px 12px 0 #0d0d0d;
    }

    .assessment-header {
      border-bottom: 3px dashed #0d0d0d;
      padding-bottom: 24px;
      margin-bottom: 24px;
    }

    .assessment-header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .assessment-code {
      font-size: 1.1rem;
      color: #2a2a2a;
      background: #eff0f3;
      padding: 4px 16px;
      border-radius: 40px;
      border: 2px solid #0d0d0d;
      display: inline-block;
    }

    .instructor-info {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .instructor-info i {
      color: #ff8e3c;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      margin-bottom: 32px;
    }

    .detail-item {
      background: #eff0f3;
      border: 2px solid #0d0d0d;
      border-radius: 24px;
      padding: 16px;
      transition: all 0.2s ease;
      box-shadow: none;
    }
    .detail-item:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }

    .detail-label {
      font-size: 0.9rem;
      color: #2a2a2a;
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 1.3rem;
      font-weight: 700;
    }

    .deadline-info {
      background: #fff1e6;
      border: 2px solid #0d0d0d;
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 32px;
      font-weight: 600;
      transition: all 0.2s ease;
      box-shadow: none;
    }
    .deadline-info:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }
    .deadline-info i {
      color: #ff8e3c;
      margin-right: 8px;
    }

    .instructions {
      background: #eff0f3;
      border: 2px solid #0d0d0d;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 32px;
      line-height: 1.6;
      transition: all 0.2s ease;
      box-shadow: none;
    }
    .instructions:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }

    .take-assessment-btn {
      width: 100%;
      padding: 18px;
      background: #ff8e3c;
      border: 3px solid #0d0d0d;
      border-radius: 60px;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: none;
      transition: all 0.2s ease;
      color: #0d0d0d;
    }

    .take-assessment-btn:hover {
      transform: translate(-3px, -3px);
      box-shadow: 8px 8px 0 #0d0d0d;
      background: #ff8e3c;
    }

    .take-assessment-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #0d0d0d;
    }

    /* Logout confirmation modal */
    #logoutConfirmModal .modal-content {
      max-width: 350px;
      transition: all 0.2s ease;
    }
    #logoutConfirmModal .modal-content:hover {
      transform: translate(-3px, -3px);
      box-shadow: 15px 15px 0 #0d0d0d;
    }
    #logoutConfirmModal .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 16px;
    }
    #logoutConfirmModal .modal-btn {
      flex: 1;
      margin: 0;
      transition: all 0.2s ease;
      box-shadow: none;
    }
    #logoutConfirmModal .modal-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }
    #logoutConfirmModal .modal-btn.secondary {
      background: #eff0f3;
    }
    #logoutConfirmModal .modal-btn.secondary:hover {
      background: #ff8e3c;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .modal-content {
      background: #ffffff;
      border: 4px solid #0d0d0d;
      border-radius: 40px;
      padding: 32px;
      max-width: 400px;
      text-align: center;
      box-shadow: none;
    }
    .modal-content i { font-size: 4rem; color: #ff8e3c; margin-bottom: 16px; }
    .modal-content h3 { font-size: 1.8rem; margin-bottom: 12px; }
    .modal-content p { margin-bottom: 24px; }
    .modal-btn {
      padding: 12px 32px;
      background: #ff8e3c;
      border: 2px solid #0d0d0d;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #0d0d0d;
    }
    .modal-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }
  </style>
</head>
<body>
  <!-- SIDEBAR with dual logos -->
  <aside class="sidebar" id="sidebar">
    <div class="logo-container">
      <img class="logo-full" src="../public\images\LogoAcadLearn.png" alt="AcadLearn" onerror="this.style.display='none'; this.parentElement.innerHTML+='<i class=\'fas fa-graduation-cap\' style=\'font-size:2rem;color:#ff8e3c;\'></i>';">
      <img class="logo-mini" src="../public\images\LogoAcadLearnMini.png" alt="AcadLearn Mini" onerror="this.style.display='none';">
    </div>
    <nav class="nav-menu">
      <a href="StudentHome.html" class="nav-item active">
        <i class="fas fa-home"></i>
        <span class="menu-label">Home</span>
      </a>
      <a href="StudentPerformanceAnalytics.html" class="nav-item">
        <i class="fas fa-chart-line"></i>
        <span class="menu-label">Performance Analytics</span>
      </a>
      <a href="StudentProfile.html" class="nav-item">
        <i class="fas fa-user-circle"></i>
        <span class="menu-label">Profile</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <span>V1.3.4.26</span>
    </div>
    <div class="sidebar-toggle-icon" id="sidebarToggle">
      <i class="fas fa-arrows-alt-h"></i>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-left">
        <a href="StudentClasses.html" class="back-button">
          <i class="fas fa-arrow-left"></i>Back
        </a>
        <div class="datetime-plain" id="datetimeTrigger">
          <i class="fas fa-clock"></i>
          <span id="liveDateTime">loading...</span>
        </div>
      </div>
      <div class="user-section">
        <div class="user-plain">
          <span class="user-name">Alex</span>
          <span class="user-course">BSIT 3</span>
        </div>
        <div class="settings-dropdown" id="settingsDropdown">
          <div class="settings-btn" id="settingsBtn">
            <i class="fas fa-cog"></i>
          </div>
          <div class="dropdown-content" id="dropdownMenu">
            <a id="settingsOption"><i class="fas fa-sliders-h"></i> Settings</a>
            <a id="logoutOption"><i class="fas fa-sign-out-alt"></i> Logout</a>
          </div>
        </div>
      </div>
    </header>

    <main class="assessment-content" id="assessmentContent">
      <!-- Dynamic content will be loaded here -->
    </main>
  </div>

  <!-- Logout Confirmation Modal -->
  <div class="modal-overlay" id="logoutConfirmModal">
    <div class="modal-content">
      <i class="fas fa-question-circle"></i>
      <h3>Confirm Logout</h3>
      <p>Are you sure you want to log out?</p>
      <div class="modal-actions">
        <button class="modal-btn" id="confirmLogoutBtn">Yes, Logout</button>
        <button class="modal-btn secondary" id="cancelLogoutBtn">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // Sidebar state management
      const sidebar = document.getElementById('sidebar');
      const savedState = localStorage.getItem('sidebarCollapsed');
      const isMobile = () => window.innerWidth <= 640;

      if (savedState === 'true') {
        sidebar.classList.add('collapsed');
      } else {
        if (isMobile() && !sidebar.classList.contains('collapsed')) {
          sidebar.classList.add('collapsed');
          localStorage.setItem('sidebarCollapsed', 'true');
        }
      }

      function toggleSidebar() {
        sidebar.classList.toggle('collapsed');
        localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
      }

      document.getElementById('sidebarToggle').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleSidebar();
      });

      // Date & time
      function getFormattedDateTime() {
        const now = new Date();
        const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getHours() % 12 || 12}:${String(now.getMinutes()).padStart(2,'0')} ${now.getHours() >= 12 ? 'PM' : 'AM'}`;
      }
      
      const dtSpan = document.getElementById('liveDateTime');
      dtSpan.textContent = getFormattedDateTime();
      setInterval(() => {
        dtSpan.textContent = getFormattedDateTime();
      }, 60000);

      document.getElementById('datetimeTrigger').addEventListener('click', () => {
        alert('Time zone: ' + Intl.DateTimeFormat().resolvedOptions().timeZone);
      });

      // Settings dropdown
      const settingsBtn = document.getElementById('settingsBtn');
      const dropdownMenu = document.getElementById('dropdownMenu');
      settingsBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdownMenu.classList.toggle('show');
      });
      document.addEventListener('click', (e) => {
        if (!settingsBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
          dropdownMenu.classList.remove('show');
        }
      });
      document.getElementById('settingsOption').addEventListener('click', (e) => {
        e.preventDefault(); 
        alert('⚙️ Settings'); 
        dropdownMenu.classList.remove('show');
      });

      // Logout with confirmation
      const logoutBtn = document.getElementById('logoutOption');
      const logoutModal = document.getElementById('logoutConfirmModal');
      const confirmLogoutBtn = document.getElementById('confirmLogoutBtn');
      const cancelLogoutBtn = document.getElementById('cancelLogoutBtn');

      function showLogoutModal() {
        logoutModal.style.display = 'flex';
        dropdownMenu.classList.remove('show');
      }
      function hideLogoutModal() {
        logoutModal.style.display = 'none';
      }
      logoutBtn.addEventListener('click', (e) => {
        e.preventDefault();
        showLogoutModal();
      });
      confirmLogoutBtn.addEventListener('click', () => {
        window.location.href = 'C:\\Users\\qwert\\MyCode\\AcadLearn\\login.html';
      });
      cancelLogoutBtn.addEventListener('click', () => {
        hideLogoutModal();
      });
      logoutModal.addEventListener('click', (e) => {
        if (e.target === logoutModal) hideLogoutModal();
      });

      // Get assessment data
      const assessment = JSON.parse(sessionStorage.getItem('currentAssessment')) || {
        id: 1,
        name: 'Thermodynamics Activity',
        type: 'Quiz',
        deadline: '2025-04-13T23:59:00',
        status: 'pending',
        posted: 'Monday, Feb 23',
        questions: 5,
        timeLimit: 20,
        points: 10
      };

      // Get course data
      const courseData = JSON.parse(sessionStorage.getItem('currentCourse')) || {
        code: 'PHY132',
        title: 'Physics I',
        instructor: 'John Marston'
      };

      // Render assessment detail
      const contentDiv = document.getElementById('assessmentContent');
      
      function formatDeadline(deadlineStr) {
        const d = new Date(deadlineStr);
        const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`;
      }

      contentDiv.innerHTML = `
        <div class="assessment-card">
          <div class="assessment-header">
            <h1>${assessment.name}</h1>
            <span class="assessment-code">${courseData.code}</span>
            <div class="instructor-info">
              <i class="fas fa-chalkboard-teacher"></i>
              <span>${courseData.instructor}</span>
            </div>
          </div>

          <div class="details-grid">
            <div class="detail-item">
              <div class="detail-label">Type</div>
              <div class="detail-value">${assessment.type}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Time Limit</div>
              <div class="detail-value">${assessment.timeLimit} Minutes</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Questions</div>
              <div class="detail-value">${assessment.questions} Items</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Total Points</div>
              <div class="detail-value">${assessment.points} Points</div>
            </div>
          </div>

          <div class="deadline-info">
            <i class="fas fa-calendar-alt"></i>
            Deadline: ${formatDeadline(assessment.deadline)}
          </div>

          <div class="instructions">
