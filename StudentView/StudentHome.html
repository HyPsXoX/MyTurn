<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>AcadLearn · Student Home</title>
  <!-- Font Awesome 5 (minimal) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <!-- SortableJS -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background-color: #eff0f3;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ----- SIDEBAR (with hover animations) ----- */
    .sidebar {
      width: 260px;
      background: #ffffff;
      border-right: 2px solid #0d0d0d;
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      flex-shrink: 0;
      transition: width 0.3s ease, padding 0.3s ease, transform 0.3s ease;
      overflow: hidden;
      white-space: nowrap;
      z-index: 300;
    }

    @media (max-width: 640px) {
      .sidebar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        transform: translateX(0);
        box-shadow: 4px 0 10px rgba(0,0,0,0.1);
      }
      .sidebar.collapsed {
        transform: translateX(-100%);
        width: 260px;
        padding: 24px 16px;
      }
      .sidebar.collapsed:hover {
        transform: translateX(-100%);
      }
      .sidebar.collapsed .nav-item i {
        display: none;
      }
    }

    .sidebar.collapsed {
      width: 80px;
      padding: 24px 10px;
    }

    .sidebar:not(.collapsed) .nav-item i {
      display: none;
    }

    .sidebar.collapsed .menu-label,
    .sidebar.collapsed .sidebar-footer span,
    .sidebar.collapsed .logo-container span {
      opacity: 0;
      width: 0;
      display: none;
    }

    .sidebar.collapsed .nav-item {
      justify-content: center;
      padding: 12px 0;
    }

    .sidebar.collapsed .nav-item i {
      display: inline-block;
      margin: 0;
      font-size: 1.6rem;
    }

    @media (min-width: 641px) {
      .sidebar.collapsed:hover {
        width: 260px;
        padding: 24px 16px;
      }
      .sidebar.collapsed:hover .menu-label,
      .sidebar.collapsed:hover .sidebar-footer span,
      .sidebar.collapsed:hover .logo-container span {
        opacity: 1;
        width: auto;
        display: inline-block;
      }
      .sidebar.collapsed:hover .nav-item {
        justify-content: flex-start;
        padding: 12px 16px;
      }
      .sidebar.collapsed:hover .nav-item i {
        display: none;
      }
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      width: 100%;
      min-height: 60px;
    }

    .logo-full, .logo-mini {
      max-width: 100%;
      height: auto;
      max-height: 60px;
      object-fit: contain;
      transition: opacity 0.2s ease;
    }

    .sidebar:not(.collapsed) .logo-mini {
      display: none;
    }
    .sidebar:not(.collapsed) .logo-full {
      display: block;
    }
    .sidebar.collapsed .logo-full {
      display: none;
    }
    .sidebar.collapsed .logo-mini {
      display: block;
    }
    .sidebar.collapsed:hover .logo-full {
      display: block;
    }
    .sidebar.collapsed:hover .logo-mini {
      display: none;
    }

    .nav-menu {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      border-radius: 14px;
      font-weight: 600;
      color: #0d0d0d;
      border: 2px solid transparent;
      transition: all 0.2s ease;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-item.active {
      background: #ff8e3c;
      border: 2px solid #0d0d0d;
      box-shadow: 3px 3px 0 #0d0d0d;
    }
    .nav-item.active i {
      color: #0d0d0d;
    }
    .nav-item:hover:not(.active) {
      background: #eff0f3;
      border: 2px solid #0d0d0d;
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 #0d0d0d;
    }

    .menu-label {
      font-size: 1rem;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 20px 8px 8px;
      border-top: 2px dashed #0d0d0d;
      text-align: center;
      font-weight: 600;
      white-space: nowrap;
    }

    .sidebar-footer span {
      font-size: 0.9rem;
      transition: opacity 0.2s;
    }

    .sidebar-toggle-icon {
      background: #ff8e3c;
      border: 2px solid #0d0d0d;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin: 16px auto 0;
      font-size: 1.3rem;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }
    .sidebar-toggle-icon:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }

    /* ----- MAIN WRAPPER ----- */
    .main-wrapper {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      background: #eff0f3;
      width: 100%;
    }

    /* TOPBAR with hover animations */
    .topbar {
      background: #ffffff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid #0d0d0d;
      flex-wrap: wrap;
      gap: 8px;
    }

    @media (min-width: 768px) {
      .topbar {
        padding: 12px 28px;
      }
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .datetime-plain {
      font-weight: 500;
      cursor: pointer;
      color: #0d0d0d;
      font-size: 0.9rem;
      white-space: nowrap;
      transition: all 0.2s ease;
      padding: 4px 8px;
      border-radius: 20px;
      border: 2px solid transparent;
    }
    .datetime-plain:hover {
      border: 2px solid #0d0d0d;
      background: #ff8e3c;
      transform: translate(-2px, -2px);
      box-shadow: 3px 3px 0 #0d0d0d;
    }
    .datetime-plain i {
      color: #ff8e3c;
      margin-right: 4px;
    }
    .datetime-plain:hover i {
      color: #0d0d0d;
    }

    .user-section {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .user-plain {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-weight: 500;
      font-size: 0.9rem;
      flex-wrap: wrap;
    }

    .user-plain .user-name {
      font-weight: 700;
      color: #0d0d0d;
    }
    .user-plain .user-course {
      color: #2a2a2a;
      font-size: 0.8rem;
    }

    .settings-dropdown {
      position: relative;
    }

    .settings-btn {
      background: #ff8e3c;
      border: 2px solid #0d0d0d;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .settings-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      right: 0;
      top: 48px;
      background: #ffffff;
      min-width: 150px;
      border: 2px solid #0d0d0d;
      border-radius: 20px;
      box-shadow: 4px 4px 0 #0d0d0d;
      z-index: 100;
    }
    .dropdown-content a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      color: #0d0d0d;
      text-decoration: none;
      border-bottom: 1px solid #0d0d0d;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .dropdown-content a:last-child {
      border-bottom: none;
    }
    .dropdown-content a:hover {
      background: #ff8e3c;
      transform: translate(-2px, -2px);
      box-shadow: 3px 3px 0 #0d0d0d;
    }
    .dropdown-content.show {
      display: block;
    }

    /* MAIN CONTENT */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      background: #eff0f3;
    }

    @media (min-width: 768px) {
      .main-content {
        padding: 28px 32px;
      }
    }

    /* Top row with search and hidden button - aligned to the right side together */
    .top-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .main-search-wrapper {
      max-width: 360px;
      flex: 0 1 auto;
      min-width: 240px;
    }

    .main-search-box {
      display: flex;
      align-items: center;
      background: #ffffff;
      border: 2px solid #0d0d0d;
      border-radius: 50px;
      padding: 2px 2px 2px 16px;
      transition: all 0.2s ease;
    }
    .main-search-box:hover,
    .main-search-box:focus-within {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }

    .main-search-box input {
      background: transparent;
      border: none;
      padding: 8px 6px;
      width: 100%;
      outline: none;
      font-size: 0.9rem;
      min-width: 140px;
    }

    .main-search-box button {
      background: #ff8e3c;
      border: 2px solid #0d0d0d;
      border-radius: 50px;
      padding: 6px 16px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      font-size: 0.9rem;
      transition: all 0.2s ease;
      color: #0d0d0d;
    }
    .main-search-box button:hover {
      transform: translate(-1px, -1px);
      box-shadow: 2px 2px 0 #0d0d0d;
    }

    .show-hidden-btn {
      background: #ffffff;
      border: 2px solid #0d0d0d;
      border-radius: 40px;
      padding: 8px 18px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }
    .show-hidden-btn:hover {
      background: #ff8e3c;
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }

    /* Cards grid - 3 cards max per row */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 380px));
      gap: 20px;
      justify-content: center;
    }

    @media (min-width: 1200px) {
      .cards-grid {
        grid-template-columns: repeat(3, minmax(280px, 380px));
      }
    }

    /* Base card style with hover animation */
    .course-card, .hidden-card-item {
      border: 3px solid #0d0d0d;
      border-radius: 24px;
      background: #ffffff;
      transition: all 0.2s ease;
      cursor: pointer;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 380px;
      margin: 0 auto;
      position: relative;
    }
    .course-card:hover, .hidden-card-item:hover {
      transform: translate(-3px, -3px);
      box-shadow: 8px 8px 0 #0d0d0d;
    }

    /* Red dot indicator */
    .unread-dot {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 14px;
      height: 14px;
      background-color: #e74c3c;
      border: 2px solid #0d0d0d;
      border-radius: 50%;
      z-index: 10;
      box-shadow: 0 0 0 2px #ffffff;
    }

    .card-header-bg {
      padding: 14px 16px 8px 16px;
      border-bottom: 2px dashed #0d0d0d;
      transition: border-color 0.2s ease;
    }
    .course-card:hover .card-header-bg,
    .hidden-card-item:hover .card-header-bg {
      border-bottom-color: #0d0d0d;
    }

    .bg-physics { background: #ff8e3c; }
    .bg-calculus { background: #d9376e; }
    .bg-chemistry { background: #3498db; }
    .bg-biology { background: #27ae60; }
    .bg-literature { background: #9b59b6; }
    .bg-history { background: #e67e22; }
    .bg-economics { background: #f1c40f; }
    .bg-cs { background: #1abc9c; }

    .course-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .course-title h2 {
      font-size: 1.4rem;
      font-weight: 700;
      word-break: break-word;
    }
    .course-title .section-plain {
      font-size: 0.75rem;
      color: #0d0d0d;
      font-weight: 500;
      display: block;
      margin-top: 4px;
    }

    .professor-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      flex-shrink: 0;
    }
    .prof-pic {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid #0d0d0d;
      background: #ff8e3c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      margin-bottom: 4px;
      transition: border-color 0.2s ease;
    }
    .course-card:hover .prof-pic,
    .hidden-card-item:hover .prof-pic {
      border-color: #0d0d0d;
    }
    .prof-fullname {
      font-weight: 600;
      font-size: 0.8rem;
      color: #0d0d0d;
      line-height: 1.2;
    }

    .due-section {
      padding: 12px 16px 6px;
      flex: 1;
    }
    .section-label {
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }
    .due-item {
      margin-bottom: 12px;
    }
    .activity-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 4px;
    }
    .activity-name {
      font-weight: 500;
      font-size: 0.9rem;
      word-break: break-word;
    }
    .status-below {
      display: block;
      font-weight: 600;
      font-size: 0.65rem;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .status-pending { color: #b45f06; }
    .status-missing { color: #c0392b; }
    .deadline-text {
      font-weight: 600;
      font-size: 0.75rem;
      white-space: nowrap;
    }
    .deadline-green { color: #0b7f3a; }
    .deadline-orange { color: #c4450c; }
    .deadline-red { color: #b11f0e; }

    .card-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px 14px;
      border-top: 2px dashed #0d0d0d;
      margin-top: auto;
      transition: border-color 0.2s ease;
    }
    .course-card:hover .card-actions,
    .hidden-card-item:hover .card-actions {
      border-top-color: #0d0d0d;
    }

    .folder-icon {
      font-size: 1.3rem;
      color: #ff8e3c;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .folder-icon:hover {
      transform: scale(1.1);
    }

    .hide-icon, .show-back-btn {
      border: 2px solid #0d0d0d;
      border-radius: 30px;
      padding: 4px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      background: #ffffff;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    .hide-icon:hover, .show-back-btn:hover {
      background: #ff8e3c;
      transform: translate(-2px, -2px);
      box-shadow: 3px 3px 0 #0d0d0d;
    }

    /* Hidden cards modal - with X close button */
    .hidden-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 400;
      padding: 20px;
    }

    .hidden-cards-container {
      background: #eff0f3;
      border: 4px solid #0d0d0d;
      border-radius: 32px;
      padding: 24px;
      max-width: 1100px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 8px 8px 0 #0d0d0d;
      transition: all 0.2s ease;
      position: relative; /* for absolute positioning of close button */
    }
    .hidden-cards-container:hover {
      transform: translate(-2px, -2px);
      box-shadow: 12px 12px 0 #0d0d0d;
    }

    /* Close X button - top right corner */
    .modal-close-x {
      position: absolute;
      top: 16px;
      right: 20px;
      width: 40px;
      height: 40px;
      border: 2px solid #0d0d0d;
      border-radius: 50%;
      background: #ff8e3c;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.4rem;
      font-weight: 700;
      transition: all 0.2s ease;
      z-index: 10;
      color: #0d0d0d;
    }
    .modal-close-x:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
      background: #ff8e3c;
    }

    .hidden-cards-container h2 {
      font-size: 1.8rem;
      border-bottom: 3px solid #0d0d0d;
      padding-bottom: 12px;
      margin-bottom: 20px;
      padding-right: 40px; /* avoid overlap with X */
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hidden-cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    /* Hidden card content styling */
    .hidden-card-content {
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .hidden-card-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .hidden-card-instructor {
      font-size: 0.9rem;
      color: #2a2a2a;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hidden-card-due {
      font-size: 0.85rem;
      background: #eff0f3;
      padding: 6px 12px;
      border-radius: 30px;
      border: 2px solid #0d0d0d;
      display: inline-block;
      margin-bottom: 16px;
      align-self: flex-start;
    }

    /* Logout confirmation modal */
    #logoutConfirmModal .modal-content {
      max-width: 350px;
      transition: all 0.2s ease;
    }
    #logoutConfirmModal .modal-content:hover {
      transform: translate(-3px, -3px);
      box-shadow: 15px 15px 0 #0d0d0d;
    }
    #logoutConfirmModal .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 16px;
    }
    #logoutConfirmModal .modal-btn {
      flex: 1;
      margin: 0;
      transition: all 0.2s ease;
    }
    #logoutConfirmModal .modal-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }
    #logoutConfirmModal .modal-btn.secondary {
      background: #eff0f3;
    }
    #logoutConfirmModal .modal-btn.secondary:hover {
      background: #ff8e3c;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .modal-content {
      background: #ffffff;
      border: 4px solid #0d0d0d;
      border-radius: 40px;
      padding: 32px;
      max-width: 400px;
      text-align: center;
      box-shadow: 12px 12px 0 #0d0d0d;
    }
    .modal-content i { font-size: 4rem; color: #ff8e3c; margin-bottom: 16px; }
    .modal-content h3 { font-size: 1.8rem; margin-bottom: 12px; }
    .modal-content p { margin-bottom: 24px; }
    .modal-btn {
      padding: 12px 32px;
      background: #ff8e3c;
      border: 2px solid #0d0d0d;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #0d0d0d;
    }
    .modal-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="logo-container">
      <img class="logo-full" src="..\public\images\LogoAcadLearn.png" alt="AcadLearn" onerror="this.style.display='none'; this.parentElement.innerHTML+='<i class=\'fas fa-graduation-cap\' style=\'font-size:2rem;color:#ff8e3c;\'></i>';">
      <img class="logo-mini" src="..\public\images\LogoAcadLearnMini.png" alt="AcadLearn Mini" onerror="this.style.display='none';">
    </div>
    <nav class="nav-menu">
      <a href="StudentHome.html" class="nav-item active">
        <i class="fas fa-home"></i>
        <span class="menu-label">Home</span>
      </a>
      <a href="StudentPerformanceAnalytics.html" class="nav-item">
        <i class="fas fa-chart-line"></i>
        <span class="menu-label">Performance Analytics</span>
      </a>
      <a href="StudentProfile.html" class="nav-item">
        <i class="fas fa-user-circle"></i>
        <span class="menu-label">Profile</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <span>V1.3.4.26</span>
    </div>
    <div class="sidebar-toggle-icon" id="sidebarToggle">
      <i class="fas fa-arrows-alt-h"></i>
    </div>
  </aside>

  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-left">
        <div class="datetime-plain" id="datetimeTrigger">
          <i class="fas fa-clock"></i>
          <span id="liveDateTime">loading...</span>
        </div>
      </div>
      <div class="user-section">
        <div class="user-plain">
          <span class="user-name">Alex</span>
          <span class="user-course">BSIT 3</span>
        </div>
        <div class="settings-dropdown" id="settingsDropdown">
          <div class="settings-btn" id="settingsBtn">
            <i class="fas fa-cog"></i>
          </div>
          <div class="dropdown-content" id="dropdownMenu">
            <a id="settingsOption"><i class="fas fa-sliders-h"></i> Settings</a>
            <a id="logoutOption"><i class="fas fa-sign-out-alt"></i> Logout</a>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content">
      <!-- Search and Hidden button together on the right -->
      <div class="top-row">
        <div class="main-search-wrapper">
          <div class="main-search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search class or section..." autocomplete="off">
            <button id="searchBtn">Go</button>
          </div>
        </div>
        <div class="show-hidden-btn" id="showHiddenBtn">
          <i class="fas fa-eye-slash"></i> Hidden
        </div>
      </div>

      <div class="cards-grid" id="cardsGrid"></div>
    </main>
  </div>

  <!-- Hidden cards modal with X close button -->
  <div class="hidden-overlay" id="hiddenOverlay">
    <div class="hidden-cards-container">
      <div class="modal-close-x" id="closeHiddenBtn"><i class="fas fa-times"></i></div>
      <h2><i class="fas fa-eye-slash"></i> Hidden Cards</h2>
      <div class="hidden-cards-grid" id="hiddenCardsGrid"></div>
    </div>
  </div>

  <div class="modal-overlay" id="logoutConfirmModal">
    <div class="modal-content">
      <i class="fas fa-question-circle"></i>
      <h3>Confirm Logout</h3>
      <p>Are you sure you want to log out?</p>
      <div class="modal-actions">
        <button class="modal-btn" id="confirmLogoutBtn">Yes, Logout</button>
        <button class="modal-btn secondary" id="cancelLogoutBtn">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const sidebar = document.getElementById('sidebar');
      const savedState = localStorage.getItem('sidebarCollapsed');
      const isMobile = () => window.innerWidth <= 640;

      if (savedState === 'true') {
        sidebar.classList.add('collapsed');
      } else {
        if (isMobile() && !sidebar.classList.contains('collapsed')) {
          sidebar.classList.add('collapsed');
          localStorage.setItem('sidebarCollapsed', 'true');
        }
      }

      function toggleSidebar() {
        sidebar.classList.toggle('collapsed');
        localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
      }

      document.getElementById('sidebarToggle').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleSidebar();
      });

      function getFormattedDateTime() {
        const now = new Date();
        const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getHours() % 12 || 12}:${String(now.getMinutes()).padStart(2,'0')} ${now.getHours() >= 12 ? 'PM' : 'AM'}`;
      }
      const dtSpan = document.getElementById('liveDateTime');
      dtSpan.textContent = getFormattedDateTime();
      setInterval(() => { dtSpan.textContent = getFormattedDateTime(); }, 60000);
      document.getElementById('datetimeTrigger').addEventListener('click', () => {
        alert('Time zone: ' + Intl.DateTimeFormat().resolvedOptions().timeZone);
      });

      const settingsBtn = document.getElementById('settingsBtn');
      const dropdownMenu = document.getElementById('dropdownMenu');
      settingsBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdownMenu.classList.toggle('show');
      });
      document.addEventListener('click', (e) => {
        if (!settingsBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
          dropdownMenu.classList.remove('show');
        }
      });
      document.getElementById('settingsOption').addEventListener('click', (e) => {
        e.preventDefault(); alert('⚙️ Settings'); dropdownMenu.classList.remove('show');
      });

      const logoutBtn = document.getElementById('logoutOption');
      const logoutModal = document.getElementById('logoutConfirmModal');
      const confirmLogoutBtn = document.getElementById('confirmLogoutBtn');
      const cancelLogoutBtn = document.getElementById('cancelLogoutBtn');

      function showLogoutModal() {
        logoutModal.style.display = 'flex';
        dropdownMenu.classList.remove('show');
      }
      function hideLogoutModal() {
        logoutModal.style.display = 'none';
      }
      logoutBtn.addEventListener('click', (e) => {
        e.preventDefault();
        showLogoutModal();
      });
      confirmLogoutBtn.addEventListener('click', () => {
        window.location.href = '../login.html';
      });
      cancelLogoutBtn.addEventListener('click', () => {
        hideLogoutModal();
      });
      logoutModal.addEventListener('click', (e) => {
        if (e.target === logoutModal) hideLogoutModal();
      });

      const cardsData = [
        { id:1, title:'Physics I', code:'PHY132', section:'BSCE1-2', instructor:'John Marston', profFull:'John Marston', profIcon:'fas fa-user-astronaut', strip:'bg-physics', due:[ { activity:'Thermodynamics', deadline:'2025-04-13T23:59:00', status:'pending' }, { activity:'Motion', deadline:'2025-04-14T15:00:00', status:'pending' } ], unread: true },
        { id:2, title:'Calculus I', code:'MATH101', section:'BSCE1-2', instructor:'Jack Marston', profFull:'Jack Marston', profIcon:'fas fa-user-ninja', strip:'bg-calculus', due:[ { activity:'Derivatives', deadline:'2025-04-13T10:00:00', status:'pending' }, { activity:'Integrals', deadline:'2025-04-14T23:59:00', status:'pending' } ], unread: true },
        { id:3, title:'Chemistry', code:'CHEM101', section:'BSCE1-2', instructor:'Marie Curie', profFull:'Marie Curie', profIcon:'fas fa-flask', strip:'bg-chemistry', due:[ { activity:'Organic Quiz', deadline:'2025-04-15T23:59:00', status:'pending' }, { activity:'Lab Exam', deadline:'2025-04-12T23:59:00', status:'missing' } ], unread: false },
        { id:4, title:'Biology', code:'BIO101', section:'BSCE1-2', instructor:'Jane Goodall', profFull:'Jane Goodall', profIcon:'fas fa-leaf', strip:'bg-biology', due:[ { activity:'Cell Test', deadline:'2025-04-16T23:59:00', status:'pending' }, { activity:'Genetics', deadline:'2025-04-13T23:59:00', status:'pending' } ], unread: true },
        { id:5, title:'Literature', code:'LIT201', section:'BSCE1-2', instructor:'Toni Morrison', profFull:'Toni Morrison', profIcon:'fas fa-book', strip:'bg-literature', due:[ { activity:'Essay', deadline:'2025-04-17T23:59:00', status:'pending' }, { activity:'Poetry', deadline:'2025-04-11T23:59:00', status:'missing' } ], unread: false },
        { id:6, title:'History', code:'HIST101', section:'BSCE1-2', instructor:'Howard Zinn', profFull:'Howard Zinn', profIcon:'fas fa-landmark', strip:'bg-history', due:[ { activity:'WWII', deadline:'2025-04-18T23:59:00', status:'pending' }, { activity:'Cold War', deadline:'2025-04-14T23:59:00', status:'pending' } ], unread: true },
        { id:7, title:'Economics', code:'ECON101', section:'BSCE1-2', instructor:'Adam Smith', profFull:'Adam Smith', profIcon:'fas fa-chart-bar', strip:'bg-economics', due:[ { activity:'Supply', deadline:'2025-04-19T23:59:00', status:'pending' }, { activity:'Market', deadline:'2025-04-15T23:59:00', status:'pending' } ], unread: true },
        { id:8, title:'CS', code:'CS101', section:'BSCE1-2', instructor:'Alan Turing', profFull:'Alan Turing', profIcon:'fas fa-laptop-code', strip:'bg-cs', due:[ { activity:'Algorithms', deadline:'2025-04-20T23:59:00', status:'pending' }, { activity:'Programming', deadline:'2025-04-16T23:59:00', status:'pending' } ], unread: false }
      ];

      let hiddenIds = new Set();

      function getDeadlineClass(deadlineStr) {
        const now = new Date();
        const due = new Date(deadlineStr);
        const diffHours = (due - now) / (1000 * 60 * 60);
        if (diffHours < 0) return 'deadline-red';
        if (diffHours <= 24) return 'deadline-orange';
        return 'deadline-green';
      }

      function formatDeadline(deadlineStr) {
        const d = new Date(deadlineStr);
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return `${months[d.getMonth()]} ${d.getDate()}, ${d.getHours() % 12 || 12}:${String(d.getMinutes()).padStart(2,'0')} ${d.getHours() >= 12 ? 'PM' : 'AM'}`;
      }

      const grid = document.getElementById('cardsGrid');
      const searchInput = document.getElementById('searchInput');

      function renderCards(filterText = '') {
        grid.innerHTML = '';
        const lowerFilter = filterText.toLowerCase();
        const filtered = cardsData.filter(card => 
          !hiddenIds.has(card.id) && 
          (card.title.toLowerCase().includes(lowerFilter) || card.section.toLowerCase().includes(lowerFilter))
        );

        filtered.forEach(card => {
          const cardDiv = document.createElement('div');
          cardDiv.className = 'course-card';
          cardDiv.setAttribute('data-id', card.id);
          
          if (card.unread) {
            const dot = document.createElement('span');
            dot.className = 'unread-dot';
            cardDiv.appendChild(dot);
          }

          const dueHtml = card.due.map(d => {
            const deadlineClass = getDeadlineClass(d.deadline);
            const statusClass = d.status === 'pending' ? 'status-pending' : 'status-missing';
            return `<div class="due-item">
              <div class="activity-row">
                <span class="activity-name">${d.activity}</span>
                <span class="deadline-text ${deadlineClass}">${formatDeadline(d.deadline)}</span>
              </div>
              <span class="status-below ${statusClass}">${d.status}</span>
            </div>`;
          }).join('');

          cardDiv.innerHTML += `
            <div class="card-header-bg ${card.strip}">
              <div class="course-header">
                <div class="course-title">
                  <h2>${card.title}</h2>
                  <span class="section-plain">${card.section}</span>
                </div>
                <div class="professor-block">
                  <div class="prof-pic"><i class="${card.profIcon}"></i></div>
                  <span class="prof-fullname">${card.profFull.split(' ')[0]}</span>
                </div>
              </div>
            </div>
            <div class="due-section">
              <div class="section-label">Upcoming</div>
              ${dueHtml}
            </div>
            <div class="card-actions">
              <i class="fas fa-folder folder-icon" title="Modules"></i>
              <div class="hide-icon"><i class="fas fa-eye-slash"></i> Hide</div>
            </div>
          `;

          cardDiv.querySelector('.hide-icon').addEventListener('click', (e) => {
            e.stopPropagation();
            hiddenIds.add(card.id);
            renderCards(searchInput.value.trim());
          });

          cardDiv.querySelector('.folder-icon').addEventListener('click', (e) => {
            e.stopPropagation();
            sessionStorage.setItem('currentCourse', JSON.stringify({ id:card.id, code:card.code, title:card.title, instructor:card.instructor }));
            sessionStorage.setItem('activeTab','modules');
            window.location.href = 'StudentClasses.html';
          });

          cardDiv.addEventListener('click', function(e) {
            if (e.target.closest('.hide-icon') || e.target.closest('.folder-icon')) return;
            if (card.unread) {
              card.unread = false;
              const dot = this.querySelector('.unread-dot');
              if (dot) dot.remove();
            }
            sessionStorage.setItem('currentCourse', JSON.stringify({ id:card.id, code:card.code, title:card.title, instructor:card.instructor }));
            window.location.href = 'StudentClasses.html';
          });

          grid.appendChild(cardDiv);
        });

        if (grid.children.length > 0) {
          Sortable.create(grid, { animation:150, handle:'.course-card', draggable:'.course-card' });
        }
      }

      renderCards('');

      searchInput.addEventListener('input', (e) => {
        renderCards(e.target.value.trim());
      });
      document.getElementById('searchBtn').addEventListener('click', (e) => {
        e.preventDefault();
        renderCards(searchInput.value.trim());
      });

      const overlay = document.getElementById('hiddenOverlay');
      const hiddenGrid = document.getElementById('hiddenCardsGrid');
      
      function updateHiddenCards() {
        hiddenGrid.innerHTML = '';
        const hidden = cardsData.filter(c => hiddenIds.has(c.id));
        if (hidden.length === 0) {
          hiddenGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; background:#ffffff; border:3px solid #0d0d0d; border-radius:24px;">No hidden cards</div>';
        } else {
          hidden.forEach(c => {
            const card = document.createElement('div');
            card.className = 'hidden-card-item';
            card.innerHTML = `
              <div class="card-header-bg ${c.strip}">
                <div class="course-header">
                  <div class="course-title">
                    <h2>${c.title}</h2>
                    <span class="section-plain">${c.section}</span>
                  </div>
                  <div class="professor-block">
                    <div class="prof-pic"><i class="${c.profIcon}"></i></div>
                    <span class="prof-fullname">${c.profFull.split(' ')[0]}</span>
                  </div>
                </div>
              </div>
              <div class="due-section">
                <div class="section-label">Instructor</div>
                <div style="margin-bottom:12px;"><i class="fas fa-user"></i> ${c.instructor}</div>
                <div class="section-label">Items</div>
                <div class="due-item">${c.due.length} assessment${c.due.length>1?'s':''}</div>
              </div>
              <div class="card-actions" style="border-top:2px dashed #0d0d0d;">
                <button class="show-back-btn" data-id="${c.id}"><i class="fas fa-undo-alt"></i> Show</button>
              </div>
            `;
            hiddenGrid.appendChild(card);
          });
          document.querySelectorAll('.show-back-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
              e.stopPropagation();
              const id = parseInt(e.target.closest('.show-back-btn').dataset.id);
              hiddenIds.delete(id);
              renderCards(searchInput.value.trim());
              updateHiddenCards();
              if (hiddenIds.size === 0) overlay.style.display = 'none';
            });
          });
        }
      }

      document.getElementById('showHiddenBtn').addEventListener('click', () => {
        updateHiddenCards();
        overlay.style.display = 'flex';
      });

      // Close with X button
      document.getElementById('closeHiddenBtn').addEventListener('click', () => {
        overlay.style.display = 'none';
      });

      // Close when clicking outside
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.style.display = 'none';
      });
    })();
  </script>
</body>
</html>
