<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>AcadLearn · Quiz Details</title>
  <!-- Font Awesome 5 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background-color: #eff0f3;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ----- SIDEBAR ----- */
    .sidebar {
      width: 260px;
      background: #ffffff;
      border-right: 2px solid #0d0d0d;
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      flex-shrink: 0;
      transition: width 0.3s ease, padding 0.3s ease;
      overflow: hidden;
      white-space: nowrap;
      z-index: 300;
    }

    @media (max-width: 640px) {
      .sidebar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        transform: translateX(0);
        box-shadow: 4px 0 10px rgba(0,0,0,0.1);
      }
      .sidebar.collapsed { transform: translateX(-100%); }
    }

    .sidebar.collapsed {
      width: 80px;
      padding: 24px 10px;
    }

    .sidebar:not(.collapsed) .nav-item i { display: none; }
    .sidebar.collapsed .menu-label,
    .sidebar.collapsed .sidebar-footer span,
    .sidebar.collapsed .logo-container span {
      opacity: 0;
      width: 0;
      display: none;
    }
    .sidebar.collapsed .nav-item { justify-content: center; padding: 12px 0; }
    .sidebar.collapsed .nav-item i { display: inline-block; margin: 0; font-size: 1.6rem; }

    @media (min-width: 641px) {
      .sidebar.collapsed:hover {
        width: 260px;
        padding: 24px 16px;
      }
      .sidebar.collapsed:hover .menu-label,
      .sidebar.collapsed:hover .sidebar-footer span,
      .sidebar.collapsed:hover .logo-container span {
        opacity: 1;
        width: auto;
        display: inline-block;
      }
      .sidebar.collapsed:hover .nav-item { justify-content: flex-start; padding: 12px 16px; }
      .sidebar.collapsed:hover .nav-item i { display: none; }
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      width: 100%;
      min-height: 60px;
    }
    .logo-full, .logo-mini {
      max-width: 100%;
      height: auto;
      max-height: 60px;
      object-fit: contain;
    }
    .sidebar:not(.collapsed) .logo-mini { display: none; }
    .sidebar:not(.collapsed) .logo-full { display: block; }
    .sidebar.collapsed .logo-full { display: none; }
    .sidebar.collapsed .logo-mini { display: block; }
    .sidebar.collapsed:hover .logo-full { display: block; }
    .sidebar.collapsed:hover .logo-mini { display: none; }

    .nav-menu {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      border-radius: 14px;
      font-weight: 600;
      color: #0d0d0d;
      border: 2px solid transparent;
      transition: all 0.2s ease;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }
    .nav-item.active {
      background: #ff8e3c;
      border: 2px solid #0d0d0d;
      box-shadow: 3px 3px 0 #0d0d0d;
    }
    .nav-item.active i { color: #0d0d0d; }
    .nav-item:hover:not(.active) {
      background: #eff0f3;
      border: 2px solid #0d0d0d;
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 #0d0d0d;
    }
    .menu-label { font-size: 1rem; white-space: nowrap; }
    .sidebar-footer {
      margin-top: auto;
      padding: 20px 8px 8px;
      border-top: 2px dashed #0d0d0d;
      text-align: center;
      font-weight: 600;
    }
    .sidebar-toggle-icon {
      background: #ff8e3c;
      border: 2px solid #0d0d0d;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin: 16px auto 0;
      font-size: 1.3rem;
      flex-shrink: 0;
      transition: all 0.2s ease;
      box-shadow: none;
    }
    .sidebar-toggle-icon:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }

    /* ----- MAIN WRAPPER ----- */
    .main-wrapper {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      background: #eff0f3;
    }

    .topbar {
      background: #ffffff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid #0d0d0d;
      flex-wrap: wrap;
      gap: 8px;
    }

    @media (min-width: 768px) { .topbar { padding: 12px 28px; } }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .back-button {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #eff0f3;
      padding: 8px 18px;
      border-radius: 40px;
      border: 2px solid #0d0d0d;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      color: #0d0d0d;
      white-space: nowrap;
      transition: all 0.2s ease;
      box-shadow: none;
    }
    .back-button:hover { 
      background: #ff8e3c; 
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }
    .datetime-plain {
      font-weight: 500;
      cursor: pointer;
      color: #0d0d0d;
      font-size: 0.9rem;
      white-space: nowrap;
      transition: all 0.2s ease;
      padding: 4px 8px;
      border-radius: 20px;
      border: 2px solid transparent;
      box-shadow: none;
    }
    .datetime-plain:hover {
      border: 2px solid #0d0d0d;
      background: #ff8e3c;
      transform: translate(-2px, -2px);
      box-shadow: 3px 3px 0 #0d0d0d;
    }
    .datetime-plain i { color: #ff8e3c; margin-right: 4px; }
    .datetime-plain:hover i { color: #0d0d0d; }

    .user-section {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .user-plain {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-weight: 500;
      font-size: 0.9rem;
    }
    .user-plain .user-name { font-weight: 700; color: #0d0d0d; }
    .user-plain .user-course { color: #2a2a2a; font-size: 0.8rem; }

    .settings-dropdown { position: relative; }
    .settings-btn {
      background: #ff8e3c;
      border: 2px solid #0d0d0d;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: none;
    }
    .settings-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      right: 0;
      top: 48px;
      background: #ffffff;
      min-width: 150px;
      border: 2px solid #0d0d0d;
      border-radius: 20px;
      box-shadow: 4px 4px 0 #0d0d0d;
      z-index: 100;
    }
    .dropdown-content a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      color: #0d0d0d;
      text-decoration: none;
      border-bottom: 1px solid #0d0d0d;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .dropdown-content a:last-child { border-bottom: none; }
    .dropdown-content a:hover { 
      background: #ff8e3c;
      transform: translate(-2px, -2px);
      box-shadow: 3px 3px 0 #0d0d0d;
    }
    .dropdown-content.show { display: block; }

    /* ----- MAIN CONTENT ----- */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      background: #eff0f3;
    }
    @media (min-width: 768px) { .main-content { padding: 28px 32px; } }

    /* Course header */
    .course-header {
      border: 3px solid #0d0d0d;
      border-radius: 32px;
      margin-bottom: 28px;
      overflow: hidden;
      box-shadow: none;
    }
    .course-header:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 #0d0d0d;
    }
    .bg-physics { background: #ff8e3c; }
    .bg-calculus { background: #d9376e; }
    .bg-chemistry { background: #3498db; }
    .bg-biology { background: #27ae60; }
    .bg-literature { background: #9b59b6; }
    .bg-history { background: #e67e22; }
    .bg-economics { background: #f1c40f; }
    .bg-cs { background: #1abc9c; }

    .course-header-content {
      padding: 20px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .course-title h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #0d0d0d;
    }
    .professor-block {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #eff0f3;
      padding: 8px 22px 8px 12px;
      border-radius: 60px;
      border: 2px solid #0d0d0d;
      transition: all 0.2s ease;
      box-shadow: none;
    }
    .professor-block:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }
    .prof-pic-placeholder {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid #0d0d0d;
      background: #ff8e3c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    .prof-info {
      font-weight: 600;
      white-space: nowrap;
    }
    .prof-info .prof-name { font-size: 1rem; }
    .prof-info .prof-label { font-size: 0.75rem; color: #2a2a2a; }

    /* Quiz details container */
    .quiz-details-container {
      width: 100%;
    }

    /* Quiz header */
    .quiz-header {
      background: #ffffff;
      border: 4px solid #0d0d0d;
      border-radius: 40px;
      padding: 32px;
      margin-bottom: 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 24px;
      box-shadow: none;
      transition: all 0.2s ease;
    }
    .quiz-header:hover {
      transform: translate(-3px, -3px);
      box-shadow: 12px 12px 0 #0d0d0d;
    }

    .quiz-title-section {
      flex: 1;
    }

    .quiz-title {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .quiz-meta {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #eff0f3;
      padding: 8px 20px;
      border: 2px solid #0d0d0d;
      border-radius: 40px;
      font-weight: 600;
    }

    .meta-item i {
      color: #ff8e3c;
    }

    .take-quiz-btn {
      background: #ff8e3c;
      border: 3px solid #0d0d0d;
      border-radius: 60px;
      padding: 16px 40px;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: none;
    }
    .take-quiz-btn:hover {
      transform: translate(-3px, -3px);
      box-shadow: 8px 8px 0 #0d0d0d;
    }

    /* Questions list */
    .questions-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .question-card {
      background: #ffffff;
      border: 3px solid #0d0d0d;
      border-radius: 32px;
      padding: 24px;
      transition: all 0.2s ease;
      box-shadow: none;
    }
    .question-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 8px 8px 0 #0d0d0d;
    }

    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px dashed #0d0d0d;
      flex-wrap: wrap;
      gap: 12px;
    }

    .question-number {
      font-size: 1.2rem;
      font-weight: 600;
      background: #ff8e3c;
      padding: 6px 16px;
      border-radius: 30px;
      border: 2px solid #0d0d0d;
    }

    .question-type {
      padding: 6px 16px;
      background: #eff0f3;
      border: 2px solid #0d0d0d;
      border-radius: 30px;
      font-weight: 600;
    }

    .question-text {
      font-size: 1.2rem;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* Options for multiple choice */
    .options-preview {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .option-preview {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #eff0f3;
      border: 2px solid #0d0d0d;
      border-radius: 30px;
    }
    .option-preview.correct {
      background: #2ecc71;
      border-width: 3px;
    }

    .option-marker {
      width: 28px;
      height: 28px;
      border: 2px solid #0d0d0d;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      background: #ffffff;
    }

    .option-text {
      flex: 1;
    }

    .correct-badge {
      background: #ffffff;
      border: 2px solid #0d0d0d;
      border-radius: 30px;
      padding: 4px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #2ecc71;
    }

    /* Answer for identification */
    .answer-preview {
      background: #eff0f3;
      border: 2px solid #0d0d0d;
      border-radius: 30px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .answer-label {
      font-weight: 600;
      margin-bottom: 8px;
      color: #2a2a2a;
    }

    .possible-answers {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .possible-answer {
      background: #ffffff;
      border: 2px solid #0d0d0d;
      border-radius: 30px;
      padding: 6px 16px;
      font-size: 0.95rem;
    }

    /* Enumeration preview */
    .enumeration-preview {
      margin-bottom: 20px;
    }

    .enum-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .enum-number {
      width: 28px;
      height: 28px;
      background: #ff8e3c;
      border: 2px solid #0d0d0d;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }

    .enum-text {
      flex: 1;
      padding: 8px 16px;
      background: #eff0f3;
      border: 2px solid #0d0d0d;
      border-radius: 30px;
    }

    .enum-options {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      color: #2a2a2a;
    }

    /* Attachments preview */
    .attachments-preview {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px dashed #0d0d0d;
    }

    .attachments-title {
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .attachment-items {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .attachment-item {
      background: #eff0f3;
      border: 2px solid #0d0d0d;
      border-radius: 16px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .attachment-item:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #ff8e3c;
    }

    .attachment-icon {
      font-size: 1.5rem;
      color: #ff8e3c;
    }

    .attachment-name {
      font-weight: 600;
    }

    /* Take Quiz Modal */
    .take-quiz-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 20px;
    }

    .take-quiz-content {
      background: #ffffff;
      border: 4px solid #0d0d0d;
      border-radius: 40px;
      padding: 32px;
      max-width: 500px;
      width: 100%;
      box-shadow: 8px 8px 0 #0d0d0d;
    }

    .take-quiz-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .take-quiz-header h2 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .take-quiz-header i {
      font-size: 3rem;
      color: #ff8e3c;
      margin-bottom: 16px;
    }

    .quiz-summary {
      background: #eff0f3;
      border: 2px solid #0d0d0d;
      border-radius: 30px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 2px dashed #0d0d0d;
    }
    .summary-row:last-child {
      border-bottom: none;
    }

    .summary-label {
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .summary-label i {
      color: #ff8e3c;
    }

    .summary-value {
      font-weight: 700;
      font-size: 1.1rem;
    }

    .question-type-breakdown {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 2px dashed #0d0d0d;
    }

    .type-count {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .modal-actions {
      display: flex;
      gap: 16px;
      margin-top: 24px;
    }

    .modal-btn {
      flex: 1;
      padding: 14px;
      border: 2px solid #0d0d0d;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      background: #ffffff;
      box-shadow: none;
    }
    .modal-btn.primary {
      background: #ff8e3c;
    }
    .modal-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }

    /* File preview modal */
    .file-preview-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
      z-index: 2100;
      padding: 20px;
    }

    .file-preview-content {
      background: #ffffff;
      border: 4px solid #0d0d0d;
      border-radius: 40px;
      padding: 24px;
      max-width: 900px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 8px 8px 0 #0d0d0d;
    }

    .file-preview-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border: 2px solid #0d0d0d;
      border-radius: 50%;
      background: #ff8e3c;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .file-preview-close:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }

    .file-preview-body {
      margin-top: 20px;
      text-align: center;
    }

    .file-preview-body img,
    .file-preview-body video,
    .file-preview-body audio {
      max-width: 100%;
      max-height: 70vh;
    }

    .file-preview-body iframe {
      width: 100%;
      height: 70vh;
      border: 2px solid #0d0d0d;
      border-radius: 16px;
    }

    /* Logout confirmation modal */
    #logoutConfirmModal .modal-content {
      max-width: 350px;
      transition: all 0.2s ease;
      box-shadow: none;
    }
    #logoutConfirmModal .modal-content:hover {
      transform: translate(-3px, -3px);
      box-shadow: 12px 12px 0 #0d0d0d;
    }
    #logoutConfirmModal .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 16px;
    }
    #logoutConfirmModal .modal-btn {
      flex: 1;
      margin: 0;
      transition: all 0.2s ease;
      box-shadow: none;
    }
    #logoutConfirmModal .modal-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }
    #logoutConfirmModal .modal-btn.secondary {
      background: #eff0f3;
    }
    #logoutConfirmModal .modal-btn.secondary:hover {
      background: #ff8e3c;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: #ffffff;
      border: 4px solid #0d0d0d;
      border-radius: 40px;
      padding: 32px;
      max-width: 400px;
      text-align: center;
      box-shadow: 8px 8px 0 #0d0d0d;
    }
    .modal-content i { font-size: 4rem; color: #ff8e3c; margin-bottom: 16px; }
    .modal-content h3 { font-size: 1.8rem; margin-bottom: 12px; }
    .modal-content p { margin-bottom: 24px; }
    .modal-btn {
      padding: 12px 32px;
      background: #ff8e3c;
      border: 2px solid #0d0d0d;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: none;
    }
    .modal-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 #0d0d0d;
    }
  </style>
</head>
<body>
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="logo-container">
      <img class="logo-full" src="../public\images\LogoAcadLearn.png" alt="AcadLearn" onerror="this.style.display='none'; this.parentElement.innerHTML+='<i class=\'fas fa-graduation-cap\' style=\'font-size:2rem;color:#ff8e3c;\'></i>';">
      <img class="logo-mini" src="../public\images\LogoAcadLearnMini.png" alt="AcadLearn Mini" onerror="this.style.display='none';">
    </div>
    <nav class="nav-menu">
      <a href="StudentHome.html" class="nav-item active">
        <i class="fas fa-home"></i>
        <span class="menu-label">Home</span>
      </a>
      <a href="StudentPerformanceAnalytics.html" class="nav-item">
        <i class="fas fa-chart-line"></i>
        <span class="menu-label">Performance Analytics</span>
      </a>
      <a href="StudentProfile.html" class="nav-item">
        <i class="fas fa-user-circle"></i>
        <span class="menu-label">Profile</span>
      </a>
    </nav>
    <div class="sidebar-footer"><span>V1.3.4.26</span></div>
    <div class="sidebar-toggle-icon" id="sidebarToggle"><i class="fas fa-arrows-alt-h"></i></div>
  </aside>

  <!-- MAIN -->
  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-left">
        <!-- Back button now ALWAYS sets activeTab to 'practice' before navigating -->
        <a href="StudentClasses.html" class="back-button" onclick="sessionStorage.setItem('activeTab', 'practice')"><i class="fas fa-arrow-left"></i> Back</a>
        <div class="datetime-plain" id="datetimeTrigger"><i class="fas fa-clock"></i><span id="liveDateTime">loading...</span></div>
      </div>
      <div class="user-section">
        <div class="user-plain"><span class="user-name">Alex Santos</span><span class="user-course">BSIT 3 - S2</span></div>
        <div class="settings-dropdown" id="settingsDropdown">
          <div class="settings-btn" id="settingsBtn"><i class="fas fa-cog"></i></div>
          <div class="dropdown-content" id="dropdownMenu">
            <a id="settingsOption"><i class="fas fa-sliders-h"></i> Settings</a>
            <a id="logoutOption"><i class="fas fa-sign-out-alt"></i> Logout</a>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content">
      <!-- Course context -->
      <div class="course-header" id="courseHeader"></div>

      <div class="quiz-details-container" id="quizDetailsContainer">
        <!-- Quiz details will be populated here -->
      </div>
    </main>
  </div>

  <!-- Take Quiz Modal -->
  <div class="take-quiz-modal" id="takeQuizModal">
    <div class="take-quiz-content">
      <div class="take-quiz-header">
        <i class="fas fa-pencil-alt"></i>
        <h2>Ready to Start?</h2>
        <p>Review the quiz details before beginning</p>
      </div>

      <div class="quiz-summary" id="quizSummary">
        <!-- Summary will be populated dynamically -->
      </div>

      <div class="modal-actions">
        <button class="modal-btn" onclick="closeTakeQuizModal()">Cancel</button>
        <button class="modal-btn primary" onclick="startQuiz()">Yes, Start Quiz</button>
      </div>
    </div>
  </div>

  <!-- File Preview Modal -->
  <div class="file-preview-modal" id="filePreviewModal">
    <div class="file-preview-content">
      <div class="file-preview-close" onclick="closeFilePreview()">
        <i class="fas fa-times"></i>
      </div>
      <h3 id="filePreviewTitle">File Preview</h3>
      <div class="file-preview-body" id="filePreviewBody"></div>
    </div>
  </div>

  <!-- Logout Confirmation Modal -->
  <div class="modal-overlay" id="logoutConfirmModal">
    <div class="modal-content">
      <i class="fas fa-question-circle"></i>
      <h3>Confirm Logout</h3>
      <p>Are you sure you want to log out?</p>
      <div class="modal-actions">
        <button class="modal-btn" id="confirmLogoutBtn">Yes, Logout</button>
        <button class="modal-btn secondary" id="cancelLogoutBtn">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // Sidebar state
      const sidebar = document.getElementById('sidebar');
      const savedState = localStorage.getItem('sidebarCollapsed');
      if (savedState === 'true') sidebar.classList.add('collapsed');
      document.getElementById('sidebarToggle').addEventListener('click', (e) => {
        e.stopPropagation();
        sidebar.classList.toggle('collapsed');
        localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
      });

      // Date & time
      function getFormattedDateTime() {
        const now = new Date();
        const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getHours() % 12 || 12}:${String(now.getMinutes()).padStart(2,'0')} ${now.getHours() >= 12 ? 'PM' : 'AM'}`;
      }
      const dtSpan = document.getElementById('liveDateTime');
      dtSpan.textContent = getFormattedDateTime();
      setInterval(() => { dtSpan.textContent = getFormattedDateTime(); }, 60000);
      document.getElementById('datetimeTrigger').addEventListener('click', () => alert('Time zone: ' + Intl.DateTimeFormat().resolvedOptions().timeZone));

      // Settings dropdown
      const settingsBtn = document.getElementById('settingsBtn');
      const dropdownMenu = document.getElementById('dropdownMenu');
      settingsBtn.addEventListener('click', (e) => { e.stopPropagation(); dropdownMenu.classList.toggle('show'); });
      document.addEventListener('click', (e) => { if (!settingsBtn.contains(e.target) && !dropdownMenu.contains(e.target)) dropdownMenu.classList.remove('show'); });
      
      document.getElementById('settingsOption').addEventListener('click', (e) => { 
        e.preventDefault(); 
        alert('⚙️ Settings'); 
        dropdownMenu.classList.remove('show'); 
      });

      // Logout with confirmation
      const logoutBtn = document.getElementById('logoutOption');
      const logoutModal = document.getElementById('logoutConfirmModal');
      const confirmLogoutBtn = document.getElementById('confirmLogoutBtn');
      const cancelLogoutBtn = document.getElementById('cancelLogoutBtn');

      function showLogoutModal() {
        logoutModal.style.display = 'flex';
        dropdownMenu.classList.remove('show');
      }
      function hideLogoutModal() {
        logoutModal.style.display = 'none';
      }
      logoutBtn.addEventListener('click', (e) => {
        e.preventDefault();
        showLogoutModal();
      });
      confirmLogoutBtn.addEventListener('click', () => {
        window.location.href = '../login.html';
      });
      cancelLogoutBtn.addEventListener('click', () => {
        hideLogoutModal();
      });
      logoutModal.addEventListener('click', (e) => {
        if (e.target === logoutModal) hideLogoutModal();
      });

      // Get course from sessionStorage
      const courseData = JSON.parse(sessionStorage.getItem('currentCourse')) || { id: 1, code: 'PHY132', title: 'Physics I', instructor: 'John Marston' };
      
      // Determine background class
      let bgClass = 'bg-physics';
      if (courseData.title.includes('Calculus')) bgClass = 'bg-calculus';
      else if (courseData.title.includes('Chemistry')) bgClass = 'bg-chemistry';
      else if (courseData.title.includes('Biology')) bgClass = 'bg-biology';
      else if (courseData.title.includes('Literature')) bgClass = 'bg-literature';
      else if (courseData.title.includes('History')) bgClass = 'bg-history';
      else if (courseData.title.includes('Economics')) bgClass = 'bg-economics';
      else if (courseData.title.includes('CS') || courseData.title.includes('Computer')) bgClass = 'bg-cs';

      // Render course header
      document.getElementById('courseHeader').innerHTML = `
        <div class="course-header-content ${bgClass}">
          <div class="course-title">
            <h1>${courseData.code} : ${courseData.title}</h1>
          </div>
          <div class="professor-block">
            <div class="prof-pic-placeholder"><i class="fas fa-chalkboard-teacher"></i></div>
            <div class="prof-info">
              <div class="prof-name">${courseData.instructor}</div>
              <div class="prof-label">Instructor</div>
            </div>
          </div>
        </div>
      `;

      // Quiz data (in real app, this would come from sessionStorage or API)
      const quizData = {
        id: 'quiz_' + Date.now(),
        title: 'Thermodynamics Quiz',
        timeLimit: 20,
        questions: [
          {
            id: 'q1',
            type: 'multiple',
            text: 'Which law of thermodynamics states that energy cannot be created or destroyed, only transformed?',
            options: ['Zeroth Law', 'First Law', 'Second Law', 'Third Law'],
            correct: [1],
            attachments: [
              {
                name: 'thermo-guide.pdf',
                type: 'application/pdf',
                data: '#'
              }
            ]
          },
          {
            id: 'q2',
            type: 'multiple',
            text: 'Heat naturally flows from:',
            options: [
              'A colder object to a hotter object',
              'A hotter object to a colder object',
              'An object with less mass to more mass',
              'A small object to a large object'
            ],
            correct: [1],
            attachments: []
          },
          {
            id: 'q3',
            type: 'identification',
            text: 'What is the SI unit of force?',
            correct: ['Newton', 'newton', 'N'],
            attachments: []
          },
          {
            id: 'q4',
            type: 'enumeration',
            text: 'List the three laws of thermodynamics.',
            answers: ['First Law', 'Second Law', 'Third Law'],
            orderMatters: true,
            minAnswers: 3,
            attachments: []
          },
          {
            id: 'q5',
            type: 'essay',
            text: 'Explain the concept of entropy and its relationship to the Second Law of Thermodynamics.',
            aiGrading: true,
            gradingNotes: 'Look for discussion of disorder, randomness, and irreversible processes',
            attachments: []
          },
          {
            id: 'q6',
            type: 'solving',
            text: 'Calculate the work done when a force of 10 N moves an object 5 meters in the direction of the force.',
            correct: '50 J',
            calculator: true,
            paint: true,
            attachments: []
          }
        ]
      };

      // Helper functions
      function getFileIcon(type) {
        if (type.startsWith('image/')) return 'fas fa-image';
        if (type.startsWith('video/')) return 'fas fa-video';
        if (type.startsWith('audio/')) return 'fas fa-headphones';
        if (type.includes('pdf')) return 'fas fa-file-pdf';
        if (type.includes('word') || type.includes('document')) return 'fas fa-file-word';
        if (type.includes('excel') || type.includes('sheet')) return 'fas fa-file-excel';
        if (type.includes('powerpoint') || type.includes('presentation')) return 'fas fa-file-powerpoint';
        return 'fas fa-file';
      }

      function truncateFileName(name, maxLength) {
        if (!name) return '';
        if (name.length <= maxLength) return name;
        const ext = name.split('.').pop();
        const nameWithoutExt = name.substring(0, name.lastIndexOf('.'));
        return nameWithoutExt.substring(0, maxLength - 3 - ext.length) + '...' + ext;
      }

      function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // Count question types
      function countQuestionTypes() {
        const counts = {
          multiple: 0,
          identification: 0,
          enumeration: 0,
          essay: 0,
          solving: 0
        };

        quizData.questions.forEach(q => {
          if (counts.hasOwnProperty(q.type)) {
            counts[q.type]++;
          }
        });

        return counts;
      }

      // Render quiz details
      function renderQuizDetails() {
        const typeCounts = countQuestionTypes();
        
        let questionsHTML = '';
        
        quizData.questions.forEach((q, index) => {
          let contentHTML = '';

          if (q.type === 'multiple') {
            contentHTML = `
              <div class="options-preview">
                ${q.options.map((opt, optIdx) => `
                  <div class="option-preview ${q.correct.includes(optIdx) ? 'correct' : ''}">
                    <div class="option-marker">${String.fromCharCode(65 + optIdx)}</div>
                    <div class="option-text">${escapeHtml(opt)}</div>
                    ${q.correct.includes(optIdx) ? '<span class="correct-badge"><i class="fas fa-check"></i> Correct</span>' : ''}
                  </div>
                `).join('')}
              </div>
            `;
          } else if (q.type === 'identification') {
            contentHTML = `
              <div class="answer-preview">
                <div class="answer-label">Possible Correct Answers:</div>
                <div class="possible-answers">
                  ${q.correct.map(ans => `<span class="possible-answer">${escapeHtml(ans)}</span>`).join('')}
                </div>
              </div>
            `;
          } else if (q.type === 'enumeration') {
            contentHTML = `
              <div class="enumeration-preview">
                ${q.answers.map((ans, ansIdx) => `
                  <div class="enum-item">
                    <div class="enum-number">${ansIdx + 1}</div>
                    <div class="enum-text">${escapeHtml(ans)}</div>
                  </div>
                `).join('')}
                <div class="enum-options">
                  <span><i class="fas fa-sort"></i> ${q.orderMatters ? 'Order matters' : 'Order does not matter'}</span>
                  <span><i class="fas fa-list"></i> Minimum ${q.minAnswers || q.answers.length} answers required</span>
                </div>
              </div>
            `;
          } else if (q.type === 'essay') {
            contentHTML = `
              <div class="answer-preview">
                <div class="answer-label">
                  <i class="fas fa-robot"></i> ${q.aiGrading ? 'AI Grading Enabled' : 'Manual Grading'}
                </div>
                ${q.gradingNotes ? `
                  <div style="margin-top: 12px; padding: 12px; background: #ffffff; border: 2px solid #0d0d0d; border-radius: 30px;">
                    <strong>Grading Notes:</strong> ${escapeHtml(q.gradingNotes)}
                  </div>
                ` : ''}
              </div>
            `;
          } else if (q.type === 'solving') {
            contentHTML = `
              <div class="answer-preview">
                <div class="answer-label">Correct Answer/Formula:</div>
                <div class="possible-answers">
                  <span class="possible-answer">${escapeHtml(q.correct)}</span>
                </div>
                <div style="margin-top: 12px; display: flex; gap: 20px;">
                  ${q.calculator ? '<span><i class="fas fa-calculator"></i> Calculator available</span>' : ''}
                  ${q.paint ? '<span><i class="fas fa-paint-brush"></i> Drawing canvas available</span>' : ''}
                </div>
              </div>
            `;
          }

          // Attachments
          if (q.attachments && q.attachments.length > 0) {
            contentHTML += `
              <div class="attachments-preview">
                <div class="attachments-title">
                  <i class="fas fa-paperclip"></i> Attachments
                </div>
                <div class="attachment-items">
                  ${q.attachments.map(file => `
                    <div class="attachment-item" onclick="previewAttachment('${file.data}', '${file.type}', '${file.name.replace(/'/g, "\\'")}')">
                      <div class="attachment-icon"><i class="${getFileIcon(file.type)}"></i></div>
                      <div class="attachment-name">${truncateFileName(file.name, 20)}</div>
                    </div>
                  `).join('')}
                </div>
              </div>
            `;
          }

          questionsHTML += `
            <div class="question-card">
              <div class="question-header">
                <span class="question-number">Question ${index + 1}</span>
                <span class="question-type">
                  ${q.type === 'multiple' ? 'Multiple Choice' : 
                    q.type === 'identification' ? 'Identification' : 
                    q.type === 'enumeration' ? 'Enumeration' : 
                    q.type === 'essay' ? 'Essay' : 'Solving'}
                </span>
              </div>
              <div class="question-text">${escapeHtml(q.text)}</div>
              ${contentHTML}
            </div>
          `;
        });

        document.getElementById('quizDetailsContainer').innerHTML = `
          <div class="quiz-header">
            <div class="quiz-title-section">
              <div class="quiz-title">${escapeHtml(quizData.title)}</div>
              <div class="quiz-meta">
                <span class="meta-item"><i class="fas fa-clock"></i> ${quizData.timeLimit} minutes</span>
                <span class="meta-item"><i class="fas fa-layer-group"></i> ${quizData.questions.length} questions</span>
                <span class="meta-item"><i class="fas fa-tasks"></i> ${Object.values(typeCounts).filter(v => v > 0).length} question types</span>
              </div>
            </div>
            <div class="take-quiz-btn" onclick="openTakeQuizModal()">
              <i class="fas fa-play"></i> Take Quiz
            </div>
          </div>
          <div class="questions-list">
            ${questionsHTML}
          </div>
        `;
      }

      // Modal functions
      window.openTakeQuizModal = function() {
        const typeCounts = countQuestionTypes();
        
        document.getElementById('quizSummary').innerHTML = `
          <div class="summary-row">
            <span class="summary-label"><i class="fas fa-question-circle"></i> Total Questions</span>
            <span class="summary-value">${quizData.questions.length}</span>
          </div>
          <div class="summary-row">
            <span class="summary-label"><i class="fas fa-clock"></i> Time Limit</span>
            <span class="summary-value">${quizData.timeLimit} minutes</span>
          </div>
          <div class="question-type-breakdown">
            <div class="type-count">
              <span>Multiple Choice</span>
              <span>${typeCounts.multiple}</span>
            </div>
            <div class="type-count">
              <span>Identification</span>
              <span>${typeCounts.identification}</span>
            </div>
            <div class="type-count">
              <span>Enumeration</span>
              <span>${typeCounts.enumeration}</span>
            </div>
            <div class="type-count">
              <span>Essay</span>
              <span>${typeCounts.essay}</span>
            </div>
            <div class="type-count">
              <span>Solving</span>
              <span>${typeCounts.solving}</span>
            </div>
          </div>
        `;
        
        document.getElementById('takeQuizModal').style.display = 'flex';
      };

      window.closeTakeQuizModal = function() {
        document.getElementById('takeQuizModal').style.display = 'none';
      };

      window.startQuiz = function() {
        // Save quiz data to sessionStorage for the TakeQuiz page
        sessionStorage.setItem('currentQuiz', JSON.stringify(quizData));
        
        // Navigate to TakeQuiz.html
        window.location.href = 'TakeQuiz.html';
      };

      // File preview
      window.previewAttachment = function(data, type, name) {
        const modal = document.getElementById('filePreviewModal');
        const body = document.getElementById('filePreviewBody');
        const title = document.getElementById('filePreviewTitle');
        
        title.textContent = name;
        
        if (type.startsWith('image/')) {
          body.innerHTML = `<img src="${data}" alt="${name}" style="max-width:100%; max-height:70vh;">`;
        } else if (type.startsWith('video/')) {
          body.innerHTML = `<video controls style="max-width:100%; max-height:70vh;"><source src="${data}" type="${type}"></video>`;
        } else if (type.startsWith('audio/')) {
          body.innerHTML = `<audio controls style="width:100%;"><source src="${data}" type="${type}"></audio>`;
        } else if (type === 'application/pdf') {
          body.innerHTML = `<iframe src="${data}" style="width:100%; height:70vh;"></iframe>`;
        } else {
          body.innerHTML = `<div style="padding:40px; text-align:center;"><i class="fas fa-file" style="font-size:5rem; color:#ff8e3c;"></i><p>${name}</p><p>Preview not available for this file type.</p></div>`;
        }
        
        modal.style.display = 'flex';
      };

      window.closeFilePreview = function() {
        document.getElementById('filePreviewModal').style.display = 'none';
        document.getElementById('filePreviewBody').innerHTML = '';
      };

      // Close modals when clicking outside
      document.getElementById('takeQuizModal').addEventListener('click', function(e) {
        if (e.target === this) {
          closeTakeQuizModal();
        }
      });

      document.getElementById('filePreviewModal').addEventListener('click', function(e) {
        if (e.target === this) {
          closeFilePreview();
        }
      });

      // Initial render
      renderQuizDetails();
    })();
  </script>
</body>
</html>
